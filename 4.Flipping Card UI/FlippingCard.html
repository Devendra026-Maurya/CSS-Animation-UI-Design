<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="FlippingCard.css">
    <title>Flipping Card UI</title>
</head>
<body>
    
    <section>
        <div class="container">
         <div class="card font-face">
             <header>
            <span class="logo">
                <img src="master.png" alt="">
                <h5>Master Card</h5>
            </span>
            <img src="chip.png" alt="" class="chip">
        </header>

        <div class="card-detail">
            <div class="card-number">
                <h6>Card Number</h6>
                <h5 class="number">8059 6040 2030 9020</h5>
                <h5 class="name">Ramlal Kumar Shah</h5>
            </div>

            <div class="valid-date">
                <h6>Valid Thru</h6>
                <h5>08/30</h5>
            </div>
        </div>
         </div>



          <div class="card back-face">
                <h6>For customer service call +977 4343 3433 or email at mastercard@gmail.com</h6>
                <span class="magnetic-strip"></span>
                <div class="signature"><i>026</i></div>
                <h5>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Inventore ea laborum voluptates iste quam eum.</h5>
          </div>
    </div>
    </section>
</body>
</html>
