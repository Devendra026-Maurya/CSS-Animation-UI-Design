<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Creditcard.css">
    <title>Creditcard UI Design</title>
</head>
<body>
    <div class="container">
        <header>
            <span class="logo">
                <img src="master.png" alt="">
                <h5>Master Card</h5>
            </span>
            <img src="chip.png" alt="" class="chip">
        </header>

        <div class="card-detail">
            <div class="card-number">
                <h6>Card Number</h6>
                <h5 class="number">8059 6040 2030 9020</h5>
                <h5 class="name">Suresh Kumar Shah</h5>
            </div>

            <div class="valid-date">
                <h6>Valid Thru</h6>
                <h5>05/29</h5>
            </div>
        </div>
    </div>
</body>
</html>
