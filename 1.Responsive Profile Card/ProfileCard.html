<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/boxicons/2.1.2/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Profile.css">
    <title>Profile Card</title>
     
</head>
<body>

    <div class="profile-card">
        <div class="image">
            <img src="profile.avif" alt="" class="profile-img">
        </div>

        <div class="text-data">
            <span class="name">CodingLab</span>
             <span class="job">YouTuber & Blogger</span>
        </div>

        <div class="media-btn">
            <a href="#" class="link" style="background: darkblue;">
                <i class="bx bxl-facebook"></i>
            </a>
            <a href="#" class="link" style="background: rgb(19, 132, 176);">
                <i class="bx bxl-twitter"></i>
            </a>
            <a href="#" class="link" style="background: rgb(220, 73, 220);">
                <i class="bx bxl-instagram"></i>
            </a>
            <a href="#" class="link" style="background: red;">
                <i class="bx bxl-youtube"></i>
            </a>
        </div>

        <div class="btn-container">
            <button class="btn">Subscribe</button>
            <button class="btn">Message</button>
        </div>

        <div class="analytics">
            <div class="data">
                <i class="bx bx-heart"></i>
                <span class="number">60k</span>
            </div>

            <div class="data">
                <i class="bx bx-message-rounded"></i>
                <span class="number">20k</span>
            </div>

            <div class="data">
                <i class="bx bx-share"></i>
                <span class="number">12k</span>
            </div>
        </div>
    </div>
    
</body>
</html>
